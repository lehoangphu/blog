<header id="site-header" class="fixed w-full z-50 transition-all duration-300 bg-transparent py-4{% if active == 'home' %} has-hero{% endif %}">
    <div class="container mx-auto px-4 flex justify-between items-center">
        <a class="flex items-center space-x-2" href="/">
            <svg class="lucide lucide-music h-6 w-6 text-bamboo-dark" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            <span class="text-lg md:text-xl font-display font-bold text-bamboo-dark">Phu &amp; Peter Le</span>
        </a>
        <nav class="hidden md:flex items-center space-x-8">
            <a class="text-foreground hover:text-bamboo-dark transition-colors{% if active == 'home' %} font-semibold text-bamboo-dark{% endif %}" href="/">Phu</a>
            <a class="text-foreground hover:text-bamboo-dark transition-colors{% if active == 'math' %} font-semibold text-bamboo-dark{% endif %}" href="/patrick">Patrick</a>
            <a class="text-foreground hover:text-bamboo-dark transition-colors{% if active == 'peter' %} font-semibold text-bamboo-dark{% endif %}" href="/peter">Peter</a>
            <a class="text-foreground hover:text-bamboo-dark transition-colors{% if active == 'khanh' %} font-semibold text-bamboo-dark{% endif %}" href="/khanh">Khanh</a>
            <a class="text-foreground hover:text-bamboo-dark transition-colors{% if active == 'live' %} font-semibold text-bamboo-dark{% endif %}" href="/live">Live</a>
        </nav>
        <button id="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-menu" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 hover:bg-accent hover:text-accent-foreground h-10 w-10 md:hidden">
            <svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
        </button>
    </div>
    <div id="mobile-menu" class="md:hidden">
        <a href="/"{% if active == 'home' %} class="active"{% endif %}>Phu</a>
        <a href="/patrick"{% if active == 'math' %} class="active"{% endif %}>Patrick</a>
        <a href="/peter"{% if active == 'peter' %} class="active"{% endif %}>Peter</a>
        <a href="/khanh"{% if active == 'khanh' %} class="active"{% endif %}>Khanh</a>
        <a href="/live"{% if active == 'live' %} class="active"{% endif %}>Live</a>
    </div>
</header>
