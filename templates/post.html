{% extends "base.html" %}

{% block title %}{{ post.title }} &middot; {{ blog_title }}{% endblock %}

{% block content %}
    <article class="post">
        <p class="back-link"><a href="{{ url_for('index') }}">&larr; All posts</a></p>
        <span class="post-category">{{ post.category }}</span>
        <h1 class="post-title">{{ post.title }}</h1>
        <p class="post-meta">
            <time datetime="{{ post.date.isoformat() }}">{{ post.date.strftime('%B %d, %Y') }}</time>
        </p>
        <div class="post-body">
            {% for paragraph in post.paragraphs %}
                <p>{{ paragraph }}</p>
            {% endfor %}
        </div>
    </article>
{% endblock %}
